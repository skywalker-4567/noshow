# =========================================================
# Database (PostgreSQL)
# =========================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
springdoc.model-and-view-allowed=true

# =========================================================
# JWT
# =========================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# =========================================================
# Email
# =========================================================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =========================================================
# Flask ML Microservice
# =========================================================
flask.predict.url=${FLASK_PREDICT_URL}
flask.health.url=${FLASK_HEALTH_URL}

# =========================================================
# Async Thread Pool
# =========================================================
spring.task.execution.pool.core-size=${ASYNC_CORE_SIZE}
spring.task.execution.pool.max-size=${ASYNC_MAX_SIZE}
spring.task.execution.pool.queue-capacity=${ASYNC_QUEUE_CAPACITY}

# =========================================================
# Swagger
# =========================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# =========================================================
# Scheduling
# =========================================================
spring.task.scheduling.pool.size=${SCHEDULING_POOL_SIZE}