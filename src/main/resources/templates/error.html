<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Error')}"></head>
<body class="bg-light">

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="card shadow-sm text-center" style="max-width: 520px; width: 100%;">
        <div class="card-body p-5">

            <div th:switch="${status}">
                <span th:case="404" class="display-1 text-secondary">404</span>
                <span th:case="403" class="display-1 text-warning">403</span>
                <span th:case="*"   class="display-1 text-danger">500</span>
            </div>

            <h4 class="mt-3 mb-2" th:text="${error}">Error</h4>
            <p class="text-muted mb-4" th:text="${message}">An unexpected error occurred.</p>

            <div th:switch="${status}">
                <div th:case="403">
                    <a href="/login" class="btn btn-primary me-2">Log In with a Different Account</a>
                </div>
                <div th:case="*">
                    <a href="javascript:history.back()" class="btn btn-outline-secondary me-2">Go Back</a>
                    <a href="/login" class="btn btn-primary">Home</a>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
